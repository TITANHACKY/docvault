name: Deploy to aaPanel

on:
  push:
    branches:
      - master # Triggers the deployment when pushing to the master branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. Navigate to your project directory on aaPanel
            cd ${{ secrets.SERVER_PATH }}
            
            # 2. Pull the latest code
            git pull origin master
            
            # 3. Build and Start the Docker Compose stack in detached mode
            docker-compose up -d --build
            
            # 4. Database Migration (optional but recommended)
            docker-compose exec -T app npx prisma db push
