version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: docvault-app
    container_name: docvault
    ports:
      - "${PORT:-3003}:3003"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    # If using local .env file instead of declaring here:
    env_file:
      - .env
